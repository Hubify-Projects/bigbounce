# Cobaya v3.3 configuration for spin-torsion dark energy model
# Paper: Golden (2026) — Geometric Dark Energy from Spin-Torsion Cosmology
#
# Usage: cobaya-run cobaya_config.yaml
# Requires: modified CAMB v1.5 (see camb_modifications.diff)

likelihood:
  planck_2018_lowl.TT: null
  planck_2018_lowl.EE: null
  planck_2018_highl_plik.TTTEEE: null
  planck_2018_lensing.clik: null
  bao.sdss_dr16_bao_all: null
  sn.pantheonplus: null

theory:
  camb:
    extra_args:
      # Spin-torsion model extensions
      dark_energy_model: SpinTorsion
      # Lambda_eff(z) follows dilution history
      Xi: 1.0e-123           # Geometric dilution parameter (fitted)
      alpha_over_M_MPl: 0.01 # Dimensionless parity-odd coefficient
      D_inf: 1.0e-121        # Inflationary dilution factor
      # Modified initial conditions
      use_bounce_ICs: true
      rho_bounce: 0.27       # In units of rho_Pl

sampler:
  mcmc:
    burn_in: 0.3
    max_tries: 10000
    Rminus1_stop: 0.01      # Gelman-Rubin convergence criterion
    Rminus1_cl_stop: 0.2
    learn_proposal: true
    proposal_scale: 2.4

params:
  # Standard LCDM parameters
  logA:
    prior: { min: 1.61, max: 3.91 }
    ref: { dist: norm, loc: 3.044, scale: 0.014 }
    latex: \log(10^{10} A_s)
  ns:
    prior: { min: 0.8, max: 1.2 }
    ref: { dist: norm, loc: 0.9649, scale: 0.0042 }
    latex: n_s
  H0:
    prior: { min: 60, max: 80 }
    ref: { dist: norm, loc: 69.2, scale: 0.8 }
    latex: H_0
  ombh2:
    prior: { min: 0.005, max: 0.1 }
    ref: { dist: norm, loc: 0.02237, scale: 0.00015 }
    latex: \Omega_b h^2
  omch2:
    prior: { min: 0.001, max: 0.99 }
    ref: { dist: norm, loc: 0.1200, scale: 0.0012 }
    latex: \Omega_c h^2
  tau:
    prior: { min: 0.01, max: 0.8 }
    ref: { dist: norm, loc: 0.0544, scale: 0.0073 }
    latex: \tau_\mathrm{reio}

  # Spin-torsion extensions
  delta_neff:
    prior: { min: -1.0, max: 2.0 }
    ref: { dist: norm, loc: 0.3, scale: 0.2 }
    latex: \Delta N_\mathrm{eff}
  omk:
    prior: { min: -0.05, max: 0.05 }
    ref: { dist: norm, loc: 0.001, scale: 0.002 }
    latex: \Omega_k
  omega_over_H:
    prior: { min: 0, max: 5.0e-11 }
    ref: 1.0e-15
    latex: (\omega/H)_0

  # Derived parameters
  sigma8:
    latex: \sigma_8
  S8:
    latex: S_8

output: chains/spin_torsion
