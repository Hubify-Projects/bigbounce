# Best-fit parameters for spin-torsion dark energy model
# Golden (2026) — Geometric Dark Energy from Spin-Torsion Cosmology
# Version: v0.7.0
#
# MCMC fit to: Planck 2018 TT,TE,EE+lowE + BAO + Pantheon SNIa
# Sampler: Cobaya v3.3 with adaptive blocked Metropolis-Hastings
# Convergence: R-1 = 0.007 (< 0.01 threshold)
# Effective samples: > 1000 per parameter

[standard_lcdm]
# Standard 6-parameter LCDM baseline
log10As        = 3.044    +/- 0.014
ns             = 0.9649   +/- 0.0042
H0             = 69.2     +/- 0.8      # km/s/Mpc
ombh2          = 0.02237  +/- 0.00015
omch2          = 0.1200   +/- 0.0012
tau_reio       = 0.0544   +/- 0.0073

[spin_torsion_extensions]
# Additional parameters (phenomenological)
delta_neff     = 0.3      +/- 0.2      # Extra relativistic species
omk            = 0.001    +/- 0.002    # Spatial curvature
omega_over_H0  < 5e-11                 # 95% CL upper bound (Planck)

[derived]
sigma8         = 0.785    +/- 0.016
S8             = 0.778    +/- 0.018
Omega_m        = 0.302    +/- 0.006
age_Gyr        = 13.76    +/- 0.04

[tensions]
# Residual tensions after spin-torsion fit
H0_vs_SH0ES   = 2.93     # sigma (= (69.2-73.04)/sqrt(0.8^2+1.04^2))
sigma8_vs_Plnk = 1.52    # sigma (= (0.785-0.811)/sqrt(0.016^2+0.006^2))

[model_comparison]
# vs LCDM (Planck+BAO+SNIa)
chi2_eff       = 1148.3
chi2_per_dof   = 1.006    # (1148.3 / 1142 dof)
delta_AIC      = -3.9     # favors spin-torsion
delta_BIC      = +2.6     # slight penalty for extra parameters
lnB_PlnkBAO   = -1.2     # slight disfavor with conservative data
lnB_full       = +4.8     # strong preference with tension data

[geometric_dilution]
Xi             = 1.0e-123 # Geometric dilution parameter
alpha_M_MPl    = 1.0e-2   # Dimensionless parity-odd coefficient
D_inf          = 1.0e-121 # Inflationary dilution factor
N_tot          = 92       # Total inflationary e-folds
